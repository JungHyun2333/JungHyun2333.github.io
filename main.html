<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="main.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
      integrity="sha512-Fo3rlrZj/k7ujTnHg4CGR2D7kSs0v4LLanw2qksYuRlEzO+tcaEPQogQ0KaoGN26/zrn20ImR1DfuLWnOo7aBA=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <title>Baskin Robbins Flavor</title>
  </head>
  <body>
    <div id="root">
      <div class="header">
        <div class="logo">
          <img src="images/logo.png" alt="logo" width="45px" height="45px" />
          <h1>맛 추천</h1>
        </div>
        <div></div>
        <div class="nav-item">
          <div>종류</div>
          <div>이달의 맛</div>
          <div>사이즈</div>
        </div>
      </div>
      <div class="background">
        <button>이달의 맛</button>
      </div>
      <div class="size">
        <div>
          <i class="fas fa-dice-three fa-2x"></i>
          <div class="size_size">파인트</div>
          <div class="size_price">8,200원</div>
        </div>
        <div>
          <i class="fas fa-dice-four fa-2x"></i>
          <div class="size_size">쿼터</div>
          <div class="size_price">15,500원</div>
        </div>
        <div>
          <i class="fas fa-dice-five fa-2x"></i>
          <div class="size_size">패밀리</div>
          <div class="size_price">22,000원</div>
        </div>
        <div>
          <i class="fas fa-dice-six fa-2x"></i>
          <div class="size_size">하프갤런</div>
          <div class="size_price">26,500원</div>
        </div>
      </div>
      <div class="flavor">
        <div class="flavor-container">
          <div class="flavor-item">
            <div>
              <div class="overlay-wrap">
                <div class="overlay">
                  <p>민트 초콜릿 칩</p>
                </div>
              </div>
              <img src="images/mintchocochip.png" />
            </div>
          </div>
          <div class="flavor-item">
            <div>
              <div class="overlay-wrap">
                <div class="overlay">
                  <p>바닐라</p>
                </div>
              </div>
              <img src="images/vanilla.png" />
            </div>
          </div>
          <div class="flavor-item">
            <div>
              <div class="overlay-wrap">
                <div class="overlay">
                  <p>레인보우 샤베트</p>
                </div>
              </div>
              <img src="images/rainbowsherbet.png" />
            </div>
          </div>
        </div>
      </div>
      <div class="event">
        <div class="event_title"><p>Event</p></div>
        <div class="email">
          <div>Your Email</div>
          <div><input type="email" placeholder=" email@example.com" /></div>
        </div>
        <div class="name">
          <div>
            <div>First name</div>
            <input type="text" />
          </div>
          <div>
            <div>Last name</div>
            <input type="text" />
          </div>
        </div>
        <div class="message">
          <div>Message</div>
          <div><textarea></textarea></div>
        </div>
        <div class="event_footer">
          <div class="event_footer-left">
            <label class="input-file-button" for="input-file"> 업로드 </label>
            <input type="file" id="input-file" style="display: none" />
          </div>
          <div><input class="send" type="submit" value="SEND" /></div>
        </div>
      </div>
    </div>
  </body>
</html>
